<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College Management Login</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0a2a2a, #003333);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: white;
    }

    .container {
        width: 320px;
        text-align: center;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 22px;
    }

    h2 {
        margin-bottom: 20px;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 25px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.2);
        color: rgb(11, 5, 5);
    }

    input::placeholder {
        color: #ddd;
    }

    button {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border-radius: 25px;
        border: none;
        margin-top: 10px;
        background: white;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #ddd;
    }

    .link {
        margin-top: 10px;
        display: block;
        cursor: pointer;
        color: #ccc;
        font-size: 14px;
    }

    .hidden {
        display: none;
    }
    title {
        text-shadow: #0a2a2a 1px 1px 2px;
        text-size-adjust: 1000px;
    }
    option {
        background: rgba(255,255,255,0.9);
        color: #333;
    }
</style>
</head>

<body>

<div class="container" id="loginPage">
    <h1>College Management</h1>
    <h2>USER LOGIN</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <select id="role" onchange="showSubRole()">
        <option value="">Select Role</option>
        <option value="student">Student</option>
        <option value="authority">Authority</option>
    </select>

    <select id="subRole" class="hidden">
        <option value="">Select Authority Type</option>
        <option>Teacher</option>
        <option>Admin</option>
        <option>Transport Head</option>
        <option>Dean</option>
    </select>
    <button onclick="window.location.href='https://attentive-smart-campus-core.base44.app'">
    Login
</button>
    

    <span class="link" onclick="showForgot()">Forgot Password?</span>
</div>


<!-- Forgot Password Page -->
<div class="container hidden" id="forgotPage">
    <h1>College Management</h1>
    <h2>Forgot Password</h2>

    <input type="email" placeholder="Enter your email">

    <button>Submit</button>

    <span class="link" onclick="showLogin()">Back to Login</span>
</div>


<script>
function showSubRole() {
    let role = document.getElementById("role").value;
    let subRole = document.getElementById("subRole");

    if (role === "authority") {
        subRole.classList.remove("hidden");
    } else {
        subRole.classList.add("hidden");
    }
}

function showForgot() {
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("forgotPage").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("forgotPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
}
</script>

    Login
</button>-->
</form>
</body>
</html>
